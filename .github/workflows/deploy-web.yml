name: Deploy frontend (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "index.html"
      - "vite.config.ts"
      - "tsconfig.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_PARTY_HOST: greatfish-sync.ssssmy.partykit.dev
          VITE_ADMIN_TOKEN: ${{ secrets.VITE_ADMIN_TOKEN }}
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=greatfish-web --branch=main --commit-message="${{ github.event.head_commit.message || 'manual deploy' }}"
